<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sasha Moon</title>
<meta name="description" content="Sasha Moon — all my links ✨">
<meta property="og:type" content="profile">
<meta property="og:title" content="Sasha Moon ✨">
<meta property="og:description" content="All my links in one place 💫">
<meta property="og:image" content="preview.jpg">
<meta name="twitter:card" content="summary_large_image">
<meta name="theme-color" content="#1a0b2e">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌙</text></svg>">
<style>
  :root{
    --bg1:#1a0b2e; --bg2:#3d1766; --bg3:#2b1055;
    --card:rgba(255,255,255,.10); --card-h:rgba(255,255,255,.20);
    --text:#fff; --muted:rgba(255,255,255,.65); --accent:#ff5e9c;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:linear-gradient(135deg,var(--bg1),var(--bg2),var(--bg3));
    background-size:220% 220%;animation:g 16s ease infinite;
    color:var(--text);min-height:100vh;display:flex;justify-content:center;
    padding:46px 18px 56px;
  }
  @keyframes g{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
  .wrap{width:100%;max-width:480px;text-align:center}
  .avatar{
    width:112px;height:112px;border-radius:50%;margin:0 auto 16px;
    background:linear-gradient(135deg,var(--accent),#a16bff);
    display:flex;align-items:center;justify-content:center;font-size:52px;
    border:3px solid rgba(255,255,255,.3);box-shadow:0 10px 34px rgba(0,0,0,.4);overflow:hidden;
  }
  .avatar img{width:100%;height:100%;object-fit:cover}
  h1{font-size:25px;font-weight:700}
  .handle{color:var(--accent);font-size:14px;margin-top:3px;font-weight:600}
  .bio{color:var(--muted);font-size:14.5px;margin:10px 0 26px;line-height:1.5}
  .links{display:flex;flex-direction:column;gap:13px}
  a.link{
    display:flex;align-items:center;gap:14px;background:var(--card);backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,.14);border-radius:16px;padding:17px 20px;
    color:var(--text);text-decoration:none;font-size:16px;font-weight:600;transition:.18s;
    box-shadow:0 4px 18px rgba(0,0,0,.2);
  }
  a.link:hover,a.link:active{background:var(--card-h);transform:translateY(-2px)}
  a.link.cta{background:linear-gradient(135deg,rgba(255,94,156,.9),rgba(161,107,255,.85));border-color:transparent}
  a.link .ico{font-size:22px;width:26px;text-align:center}
  a.link .txt{flex:1;text-align:left}
  a.link .arrow{color:var(--muted);font-size:18px}
  .socials{display:flex;justify-content:center;flex-wrap:wrap;gap:20px;margin-top:28px}
  .socials a{color:var(--muted);font-size:25px;text-decoration:none;transition:.18s}
  .socials a:hover{color:var(--text);transform:scale(1.18)}
  footer{margin-top:32px;color:rgba(255,255,255,.35);font-size:12px}
</style>
</head>
<body>
<div class="wrap">
  <div class="avatar"><span id="ava">🌙</span></div>
  <h1 id="name"></h1>
  <div class="handle" id="handle"></div>
  <p class="bio" id="bio"></p>
  <div class="links" id="links"></div>
  <div class="socials" id="socials"></div>
  <footer>© <span id="yr"></span> Sasha Moon</footer>
</div>
<script>
/* ====== РЕДАКТИРУЕТСЯ ТУТ ====== */
const PROFILE = {
  name: "Sasha Moon",
  handle: "@sasha_moon00",
  bio: "✨ AI model & creator · 18+ exclusive content",
  avatar: "",            // вставь URL фото → заменит луну. Напр: "avatar.jpg"
  avatarEmoji: "🌙",

  // Главные кнопки (cta = выделенная). Порядок = сверху вниз.
  links: [
    { ico:"💬", text:"Telegram (main)", url:"https://t.me/+eBQ8r2dSR3o0Nzli", cta:true },
    { ico:"💎", text:"Fanvue — exclusive", url:"https://www.fanvue.com/sasha.m", cta:true },
    { ico:"🔥", text:"OnlyFans", url:"https://onlyfans.com/sasha_moon", cta:true },
  ],

  // Соцсети (иконки внизу)
  socials: [
    { ico:"📷", url:"https://www.instagram.com/sasha_moon00/" },     // Instagram
    { ico:"🧵", url:"https://www.threads.com/@sasha_moon00" },        // Threads
    { ico:"🎵", url:"https://www.tiktok.com/@sashamoon30" },          // TikTok
    { ico:"✖️", url:"https://x.com/SashaMoon00" },                    // X
    { ico:"👤", url:"https://www.facebook.com/profile.php?id=61590896252495" }, // Facebook
  ],
};
/* ====== /РЕДАКТИРУЕТСЯ ТУТ ====== */
(function(){
  document.getElementById("name").textContent=PROFILE.name;
  document.getElementById("handle").textContent=PROFILE.handle;
  document.getElementById("bio").textContent=PROFILE.bio;
  document.title=PROFILE.name;
  if(PROFILE.avatar){document.getElementById("ava").outerHTML='<img src="'+PROFILE.avatar+'" alt="Sasha Moon">';}
  else{document.getElementById("ava").textContent=PROFILE.avatarEmoji;}
  var L=document.getElementById("links");
  PROFILE.links.forEach(function(l){
    var a=document.createElement("a");a.className="link"+(l.cta?" cta":"");
    a.href=l.url;a.target="_blank";a.rel="noopener";
    a.innerHTML='<span class="ico">'+l.ico+'</span><span class="txt">'+l.text+'</span><span class="arrow">→</span>';
    L.appendChild(a);
  });
  var S=document.getElementById("socials");
  PROFILE.socials.forEach(function(s){
    var a=document.createElement("a");a.href=s.url;a.target="_blank";a.rel="noopener";a.textContent=s.ico;
    S.appendChild(a);
  });
  document.getElementById("yr").textContent=new Date().getFullYear();
})();
</script>
</body>
</html>
