<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>Sasha Moon</title>
<meta name="description" content="Sasha Moon — all my links in one place ✨">
<meta property="og:type" content="profile">
<meta property="og:title" content="Sasha Moon ✨">
<meta property="og:description" content="All my links in one place 💫">
<meta property="og:image" content="preview.jpg">
<meta property="og:url" content="https://sasha-moon.github.io/vip">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Sasha Moon ✨">
<meta name="theme-color" content="#160a2e">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌙</text></svg>">
<style>
  :root{
    --accent:#ff5e9c; --accent2:#a16bff; --accent3:#5ec6ff;
    --text:#fff; --muted:rgba(255,255,255,.62);
    --card:rgba(255,255,255,.07); --card-h:rgba(255,255,255,.16); --stroke:rgba(255,255,255,.13);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html{-webkit-text-size-adjust:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,sans-serif;
    color:var(--text);min-height:100vh;overflow-x:hidden;position:relative;
    background:#160a2e;display:flex;justify-content:center;padding:54px 18px 64px;
  }
  /* анимированный градиент-фон + плавающие орбы */
  .bg{position:fixed;inset:0;z-index:-2;background:linear-gradient(135deg,#160a2e,#3d1766,#241056,#1a0b38);
      background-size:300% 300%;animation:gr 18s ease infinite}
  @keyframes gr{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
  .orb{position:fixed;z-index:-1;border-radius:50%;filter:blur(70px);opacity:.5;animation:fl 20s ease-in-out infinite}
  .orb.a{width:300px;height:300px;background:var(--accent);top:-80px;left:-60px}
  .orb.b{width:280px;height:280px;background:var(--accent2);bottom:-70px;right:-50px;animation-delay:-7s}
  .orb.c{width:200px;height:200px;background:var(--accent3);top:40%;right:-40px;animation-delay:-13s;opacity:.35}
  @keyframes fl{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(30px,-40px) scale(1.1)}66%{transform:translate(-20px,30px) scale(.95)}}

  .wrap{width:100%;max-width:480px;text-align:center;animation:rise .6s ease both}
  @keyframes rise{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}

  .ava-ring{width:124px;height:124px;margin:0 auto 18px;border-radius:50%;padding:3px;
    background:conic-gradient(from 0deg,var(--accent),var(--accent2),var(--accent3),var(--accent));
    animation:spin 6s linear infinite;box-shadow:0 12px 40px rgba(161,107,255,.45)}
  @keyframes spin{to{transform:rotate(360deg)}}
  .avatar{width:100%;height:100%;border-radius:50%;background:#1c0f3a;display:flex;
    align-items:center;justify-content:center;font-size:54px;overflow:hidden;animation:spin 6s linear infinite reverse}
  .avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}

  .name-row{display:flex;align-items:center;justify-content:center;gap:7px}
  h1{font-size:26px;font-weight:800;letter-spacing:.2px}
  .verified{width:21px;height:21px;flex:none}
  .handle{color:var(--accent);font-size:14px;margin-top:4px;font-weight:600}
  .bio{color:var(--muted);font-size:14.5px;margin:11px auto 28px;line-height:1.55;max-width:340px}

  .links{display:flex;flex-direction:column;gap:13px}
  a.link{display:flex;align-items:center;gap:14px;background:var(--card);backdrop-filter:blur(14px);
    -webkit-backdrop-filter:blur(14px);border:1px solid var(--stroke);border-radius:17px;padding:17px 20px;
    color:var(--text);text-decoration:none;font-size:16px;font-weight:600;position:relative;overflow:hidden;
    transition:transform .18s,background .18s,box-shadow .18s;box-shadow:0 4px 20px rgba(0,0,0,.22);
    animation:rise .5s ease both}
  a.link:hover,a.link:active{background:var(--card-h);transform:translateY(-3px) scale(1.01);box-shadow:0 10px 30px rgba(0,0,0,.3)}
  a.link.cta{background:linear-gradient(120deg,rgba(255,94,156,.92),rgba(161,107,255,.88));border-color:transparent;
    box-shadow:0 8px 26px rgba(255,94,156,.35)}
  a.link.cta:hover{box-shadow:0 12px 34px rgba(255,94,156,.5)}
  /* блик пробегает по CTA */
  a.link.cta::after{content:"";position:absolute;top:0;left:-120%;width:60%;height:100%;
    background:linear-gradient(120deg,transparent,rgba(255,255,255,.35),transparent);transform:skewX(-20deg);
    animation:shine 4.5s ease-in-out infinite}
  @keyframes shine{0%,60%{left:-120%}80%,100%{left:130%}}
  a.link .ico{font-size:22px;width:26px;text-align:center;flex:none}
  a.link .txt{flex:1;text-align:left}
  a.link .arrow{opacity:.6;font-size:18px;transition:transform .18s}
  a.link:hover .arrow{transform:translateX(4px)}

  .socials{display:flex;justify-content:center;flex-wrap:wrap;gap:18px;margin-top:30px}
  .socials a{width:46px;height:46px;border-radius:50%;background:var(--card);border:1px solid var(--stroke);
    display:flex;align-items:center;justify-content:center;font-size:22px;text-decoration:none;
    transition:transform .18s,background .18s;backdrop-filter:blur(10px)}
  .socials a:hover{background:var(--card-h);transform:translateY(-3px) scale(1.08)}
  footer{margin-top:34px;color:rgba(255,255,255,.34);font-size:12px;letter-spacing:.3px}
</style>
</head>
<body>
<div class="bg"></div><div class="orb a"></div><div class="orb b"></div><div class="orb c"></div>
<div class="wrap">
  <div class="ava-ring"><div class="avatar"><span id="ava">🌙</span></div></div>
  <div class="name-row">
    <h1 id="name"></h1>
    <svg class="verified" viewBox="0 0 24 24" fill="none"><path d="M12 2l2.4 1.8 3 .1 1 2.8 2.4 1.8-1 2.8 1 2.8-2.4 1.8-1 2.8-3 .1L12 22l-2.4-1.8-3-.1-1-2.8L3.2 15.5l1-2.8-1-2.8 2.4-1.8 1-2.8 3-.1L12 2z" fill="#5ec6ff"/><path d="M8.5 12.2l2.3 2.3 4.7-4.7" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </div>
  <div class="handle" id="handle"></div>
  <p class="bio" id="bio"></p>
  <div class="links" id="links"></div>
  <div class="socials" id="socials"></div>
  <footer>© <span id="yr"></span> Sasha Moon</footer>
</div>
<script>
/* ====== РЕДАКТИРУЕТСЯ ТУТ ====== */
const PROFILE = {
  name: "Sasha Moon",
  handle: "@sasha_moon00",
  bio: "✨ AI model & creator · 18+ exclusive content 💫",
  avatar: "",            // URL фото → заменит луну (напр. "avatar.jpg")
  avatarEmoji: "🌙",
  links: [
    { ico:"💬", text:"Telegram",          url:"https://t.me/+eBQ8r2dSR3o0Nzli", cta:true },
    { ico:"💎", text:"Fanvue — exclusive", url:"https://www.fanvue.com/sasha.m", cta:true },
    { ico:"🔥", text:"OnlyFans",           url:"https://onlyfans.com/sasha_moon", cta:true },
  ],
  socials: [
    { ico:"📷", url:"https://www.instagram.com/sasha_moon00/" },
    { ico:"🧵", url:"https://www.threads.com/@sasha_moon00" },
    { ico:"🎵", url:"https://www.tiktok.com/@sashamoon30" },
    { ico:"𝕏", url:"https://x.com/SashaMoon00" },
    { ico:"👤", url:"https://www.facebook.com/profile.php?id=61590896252495" },
  ],
};
/* ====== /РЕДАКТИРУЕТСЯ ТУТ ====== */
(function(){
  var $=function(i){return document.getElementById(i)};
  $("name").textContent=PROFILE.name; $("handle").textContent=PROFILE.handle;
  $("bio").textContent=PROFILE.bio; document.title=PROFILE.name;
  if(PROFILE.avatar){$("ava").outerHTML='<img src="'+PROFILE.avatar+'" alt="Sasha Moon">';}
  else{$("ava").textContent=PROFILE.avatarEmoji;}
  var L=$("links");
  PROFILE.links.forEach(function(l,i){
    var a=document.createElement("a");a.className="link"+(l.cta?" cta":"");
    a.href=l.url;a.target="_blank";a.rel="noopener";a.style.animationDelay=(0.1+i*0.07)+"s";
    a.innerHTML='<span class="ico">'+l.ico+'</span><span class="txt">'+l.text+'</span><span class="arrow">→</span>';
    L.appendChild(a);
  });
  var S=$("socials");
  PROFILE.socials.forEach(function(s){
    var a=document.createElement("a");a.href=s.url;a.target="_blank";a.rel="noopener";a.textContent=s.ico;
    S.appendChild(a);
  });
  $("yr").textContent=new Date().getFullYear();
})();
</script>
</body>
</html>
