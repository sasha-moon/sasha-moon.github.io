<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>Sasha Moon</title>
<meta name="description" content="Sasha Moon — exclusive 18+ content ✨">
<meta property="og:type" content="profile">
<meta property="og:title" content="Sasha Moon ✨">
<meta property="og:description" content="Exclusive 18+ content 💫">
<meta property="og:image" content="img/main.jpg">
<meta property="og:url" content="https://sasha-moon.github.io">
<meta name="twitter:card" content="summary_large_image">
<meta name="theme-color" content="#05060f">
<link rel="icon" href="img/main.jpg">
<style>
  :root{--accent:#ff5e9c;--accent2:#a16bff;--text:#fff;--muted:rgba(255,255,255,.75)}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html{-webkit-text-size-adjust:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;color:var(--text);
    min-height:100vh;overflow-x:hidden;position:relative;display:flex;justify-content:center;padding:24px 10px 60px}
  .bg{position:fixed;inset:0;z-index:-2;background:#05060f url("moon.jpg") center top/cover no-repeat fixed}
  .veil{position:fixed;inset:0;z-index:-1;background:linear-gradient(180deg,rgba(5,6,15,.3) 0%,rgba(5,6,15,.6) 50%,rgba(5,6,15,.92) 100%)}
  .wrap{width:100%;max-width:500px;text-align:center;animation:rise .6s ease both}
  @keyframes rise{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
  /* ЗАГЛАВНОЕ ФОТО — горизонтальное (видно попу) */
  /* hero — горизонтальный, поуже (с боков отступы) */
  .hero{width:90%;max-width:440px;margin:0 auto 16px;border-radius:20px;overflow:hidden;
    box-shadow:0 14px 50px rgba(0,0,0,.6);border:1px solid rgba(255,255,255,.12)}
  .hero img{width:100%;height:auto;display:block}
  .name-row{display:flex;align-items:center;justify-content:center;gap:7px}
  h1{font-size:28px;font-weight:800;text-shadow:0 2px 12px rgba(0,0,0,.6)}
  .verified{width:22px;height:22px;flex:none}
  .handle{color:#ff8ab8;font-size:14px;margin-top:4px;font-weight:600;text-shadow:0 1px 8px rgba(0,0,0,.6)}
  .bio{color:var(--muted);font-size:15px;margin:9px auto 22px;line-height:1.5;max-width:320px;text-shadow:0 1px 8px rgba(0,0,0,.6)}
  .links{display:flex;flex-direction:column;gap:16px}
  /* КНОПКА = большое фото, внизу строка: лого + сервис */
  a.link{position:relative;display:block;width:100%;height:500px;border-radius:22px;overflow:hidden;
    text-decoration:none;color:#fff;box-shadow:0 8px 30px rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.12);
    transition:transform .2s,box-shadow .2s;animation:rise .5s ease both}
  a.link:hover,a.link:active{transform:translateY(-3px) scale(1.01);box-shadow:0 16px 42px rgba(0,0,0,.6)}
  a.link img.photo{width:100%;height:100%;object-fit:cover;object-position:center 18%;display:block}
  a.link .label{position:absolute;left:0;right:0;bottom:0;padding:18px 22px;display:flex;align-items:center;gap:12px;
    background:linear-gradient(180deg,transparent,rgba(0,0,0,.35) 35%,rgba(0,0,0,.85))}
  a.link .label .brand{width:26px;height:26px;flex:none;border-radius:6px;filter:drop-shadow(0 1px 3px rgba(0,0,0,.6))}
  a.link .label .svc{font-size:21px;font-weight:800;letter-spacing:.2px;text-shadow:0 2px 10px rgba(0,0,0,.8)}
  a.link .label .arrow{margin-left:auto;font-size:22px;opacity:.85;transition:transform .2s}
  a.link:hover .label .arrow{transform:translateX(5px)}
  footer{margin-top:30px;color:rgba(255,255,255,.4);font-size:12px;text-shadow:0 1px 6px rgba(0,0,0,.6)}
</style>
</head>
<body>
<div class="bg"></div><div class="veil"></div>
<div class="wrap">
  <div class="hero"><img src="img/hero.jpg?v=4" alt="Sasha Moon"></div>
  <div class="name-row"><h1 id="name"></h1>
    <svg class="verified" viewBox="0 0 24 24" fill="none"><path d="M12 2l2.4 1.8 3 .1 1 2.8 2.4 1.8-1 2.8 1 2.8-2.4 1.8-1 2.8-3 .1L12 22l-2.4-1.8-3-.1-1-2.8L3.2 15.5l1-2.8-1-2.8 2.4-1.8 1-2.8 3-.1L12 2z" fill="#5ec6ff"/><path d="M8.5 12.2l2.3 2.3 4.7-4.7" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </div>
  <div class="handle" id="handle"></div>
  <p class="bio" id="bio"></p>
  <div class="links" id="links"></div>
  <footer>© <span id="yr"></span> Sasha Moon</footer>
</div>
<script>
/* ====== EDIT HERE ====== */
const PROFILE = {
  name: "Sasha Moon",
  handle: "@sasha_moon00",
  bio: "Exclusive 18+ content 💫",
  links: [
    { ph:"img/telegram.jpg", icon:"icons/telegram.svg", text:"Telegram",  url:"https://t.me/+eBQ8r2dSR3o0Nzli", cta:true },
    { ph:"img/fanvue.jpg",   icon:"icons/fanvue.png",   text:"Fanvue",    url:"https://www.fanvue.com/sasha.m", cta:true },
    { ph:"img/onlyfans.jpg", icon:"icons/onlyfans.svg", text:"OnlyFans",  url:"https://onlyfans.com/sasha_moon", cta:true },
    { ph:"img/fansly.jpg",   icon:"icons/fansly.svg",   text:"Fansly",    url:"https://fansly.com/SashaMoon03", cta:true },
    { ph:"img/threads.jpg",  icon:"icons/threads.svg",  text:"Threads",   url:"https://www.threads.com/@sasha_moon00" },
    { ph:"img/x.jpg",        icon:"icons/x.svg",        text:"X",         url:"https://x.com/SashaMoon00" },
  ],
};
/* ====== /EDIT HERE ====== */
(function(){
  var $=function(i){return document.getElementById(i)};
  $("name").textContent=PROFILE.name;$("handle").textContent=PROFILE.handle;
  $("bio").textContent=PROFILE.bio;document.title=PROFILE.name;
  var L=$("links");
  PROFILE.links.forEach(function(l,i){var a=document.createElement("a");a.className="link"+(l.cta?" cta":"");
    a.href=l.url;a.target="_blank";a.rel="noopener";a.style.animationDelay=(0.08+i*0.05)+"s";
    a.innerHTML='<img class="photo" src="'+l.ph+'?v=3" alt=""><span class="label"><img class="brand" src="'+l.icon+'?v=3" alt=""><span class="svc">'+l.text+'</span><span class="arrow">→</span></span>';
    L.appendChild(a);});
  $("yr").textContent=new Date().getFullYear();
})();
</script>
</body>
</html>
